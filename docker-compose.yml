services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: oliveto-api:latest
    container_name: oliveto_api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    networks:
      - oliveto
      - postgresql_network
      - redis_network
    labels:
      - traefik.enable=true
      - traefik.docker.network=oliveto
      # router dedicado da API
      - traefik.http.routers.oliveto-api.rule=Host(`api.olivetocontabilidade.com`)
      - traefik.http.routers.oliveto-api.entrypoints=websecure
      - traefik.http.routers.oliveto-api.tls.certresolver=letsencrypt
      - traefik.http.services.oliveto-api.loadbalancer.server.port=8080
      # segurança básica de headers
      - traefik.http.middlewares.oliveto-api-headers.headers.stsSeconds=31536000
      - traefik.http.middlewares.oliveto-api-headers.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.oliveto-api-headers.headers.contentTypeNosniff=true
      - traefik.http.middlewares.oliveto-api-headers.headers.browserXssFilter=true
      - traefik.http.routers.oliveto-api.middlewares=oliveto-api-headers
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  oliveto:
    name: oliveto
    external: true          # criado pelo compose do front (fonte da verdade)
  postgresql_network:
    name: postgresql-tiqw_default
    external: true
  redis_network:
    name: redis-w8ub_default
    external: true