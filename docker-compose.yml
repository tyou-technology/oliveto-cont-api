services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: oliveto-api:latest
    container_name: oliveto_api
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      # Override connection strings to use Docker service names instead of localhost
      DATABASE_URL: "mysql://oliveto:${MYSQL_PASSWORD}@mysql:3306/oliveto"
      REDIS_URL: "redis://redis:6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oliveto_network

  mysql:
    image: mysql:8.0
    container_name: oliveto_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_USER: oliveto
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: oliveto
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - oliveto_network

  redis:
    image: redis:7-alpine
    container_name: oliveto_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oliveto_network

networks:
  oliveto_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
