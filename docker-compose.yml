services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: oliveto-api:latest
    container_name: oliveto_api
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    healthcheck:
      # TODO: replace with HTTP check once GET /api/health endpoint is implemented
      test: ["CMD", "node", "-e", "require('net').connect(8080,'127.0.0.1').on('connect',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - oliveto
    labels:
      - traefik.enable=true
      - traefik.docker.network=oliveto
      - traefik.http.routers.oliveto.rule=Host(`olivetocontabilidade.com`) || Host(`www.olivetocontabilidade.com`)
      - traefik.http.routers.oliveto.entrypoints=websecure
      - traefik.http.routers.oliveto.tls.certresolver=letsencrypt
      - traefik.http.services.oliveto.loadbalancer.server.port=8080

networks:
  oliveto:
    name: oliveto
    driver: bridge
